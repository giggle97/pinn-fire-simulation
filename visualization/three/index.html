<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> WUI 火灾蔓延 3D 动态可视化</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; }
        #info {
            position: absolute; top: 10px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        #controls {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px; background: rgba(0,0,0,0.7); padding: 10px;
            border-radius: 8px; color: white; font-family: sans-serif;
        }
        button {
            padding: 8px 16px; background: #ff6b35; border: none; border-radius: 4px;
            color: white; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #ff8c5a; }
        input[type="range"] { width: 200px; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">
        <h2>🔥 WUI 火灾蔓延 3D 动态可视化</h2>
        <p>颜色/高度代表火到达的时间 (越亮/越高 = 时间越晚)<br>
        鼠标左键旋转 | 右键平移 | 滚轮缩放</p>
    </div>

    <div id="controls">
        <button id="playBtn">▶️ 播放</button>
        <button id="pauseBtn">️ 暂停</button>
        <button id="resetBtn">🔄 重置</button>
        <label>时间: <span id="timeDisplay">0.00</span>s</label>
        <input type="range" id="timeSlider" min="0" max="3" step="0.01" value="0">
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景初始化
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111111);
        scene.fog = new THREE.FogExp2(0x111111, 0.02);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 20);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 灯光
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 全局变量
        let mesh = null;
        let originalColors = [];
        let maxTime = 0;
        let currentTime = 0;
        let isPlaying = false;
        let animationId = null;
        let data = null; // 存储加载的数据

        // 加载数据
        fetch('fire_simulation_data.json')
            .then(response => response.json())
            .then(jsonData => {
                data = jsonData;
                createFireMap(data);
                // 设置时间滑块的最大值
                document.getElementById('timeSlider').max = maxTime;
                setupControls();
            })
            .catch(err => console.error('加载数据失败:', err));

        function createFireMap(data) {
            const resolution = data.resolution;
            const geometry = new THREE.PlaneGeometry(data.width, data.height, resolution - 1, resolution - 1);
            
            const positions = geometry.attributes.position.array;
            const colors = [];
            
            // 找极值
            let minTime = Infinity;
            data.vertices.forEach(v => {
                if (v[2] > maxTime) maxTime = v[2];
                if (v[2] < minTime) minTime = v[2];
            });

            // 填充高度和原始颜色
            for (let i = 0; i < data.vertices.length; i++) {
                const x = data.vertices[i][0];
                const y = data.vertices[i][1];
                const t = data.vertices[i][2];

                positions[i * 3 + 2] = t * 1.5; // Z = 时间 * 放大系数

                // 计算原始颜色（用于动画时恢复）
                const normT = (t - minTime) / (maxTime - minTime || 1);
                let r, g, b;
                if (normT < 0.25) {
                    r = normT * 4; g = 0; b = 0;
                } else if (normT < 0.5) {
                    r = 1; g = (normT - 0.25) * 4; b = 0;
                } else if (normT < 0.75) {
                    r = 1; g = 1; b = (normT - 0.5) * 4;
                } else {
                    r = 1; g = 1; b = 0.5 + (normT - 0.75) * 2;
                }
                originalColors.push(r, g, b);
                colors.push(0, 0, 0); // 初始全黑
            }

            geometry.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
            geometry.computeVertexNormals();

            const material = new THREE.MeshStandardMaterial({ 
                vertexColors: true,
                roughness: 0.4,
                metalness: 0.1,
                side: THREE.DoubleSide
            });

            mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            // 添加道路标记
            const roadGeo = new THREE.BoxGeometry(2, 0.1, 10);
            const roadMat = new THREE.MeshBasicMaterial({ color: 0xaaaaaa, transparent: true, opacity: 0.3 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.position.set(5, 0.05, 0);
            scene.add(road);

            // 添加起火点标记
            const sourceGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const sourceMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const source = new THREE.Mesh(sourceGeo, sourceMat);
            source.position.set(1, 0.5, 1);
            scene.add(source);
        }

        // 更新颜色基于当前时间
        function updateColors() {
            if (!mesh) return;
            
            const colors = mesh.geometry.attributes.color.array;
            const timeThreshold = currentTime;

            for (let i = 0; i < originalColors.length; i += 3) {
                const vertexIndex = i / 3;
                const t = data.vertices[vertexIndex][2]; // 获取该点的实际到达时间

                if (t <= timeThreshold) {
                    // 火已到达，显示原始颜色
                    colors[i] = originalColors[i];
                    colors[i+1] = originalColors[i+1];
                    colors[i+2] = originalColors[i+2];
                } else {
                    // 火未到达，保持黑色
                    colors[i] = 0;
                    colors[i+1] = 0;
                    colors[i+2] = 0;
                }
            }

            mesh.geometry.attributes.color.needsUpdate = true;
            document.getElementById('timeDisplay').textContent = currentTime.toFixed(2);
            document.getElementById('timeSlider').value = currentTime;
        }

        // 动画循环
        function animate() {
            if (isPlaying) {
                currentTime += 0.016; // 约60fps，每秒增加0.016s
                if (currentTime > maxTime) {
                    currentTime = maxTime;
                    isPlaying = false;
                    document.getElementById('playBtn').textContent = '▶️ 播放';
                }
                updateColors();
            }
            controls.update();
            renderer.render(scene, camera);
            animationId = requestAnimationFrame(animate);
        }

        // 控制按钮
        function setupControls() {
            document.getElementById('playBtn').addEventListener('click', () => {
                if (!isPlaying) {
                    isPlaying = true;
                    document.getElementById('playBtn').textContent = '⏸️ 暂停';
                }
            });

            document.getElementById('pauseBtn').addEventListener('click', () => {
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶️ 播放';
            });

            document.getElementById('resetBtn').addEventListener('click', () => {
                currentTime = 0;
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶️ 播放';
                updateColors();
            });

            document.getElementById('timeSlider').addEventListener('input', (e) => {
                currentTime = parseFloat(e.target.value);
                isPlaying = false;
                document.getElementById('playBtn').textContent = '▶️ 播放';
                updateColors();
            });

            // 启动动画循环
            animate();
        }

        // 窗口调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
